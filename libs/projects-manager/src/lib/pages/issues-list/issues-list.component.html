<div class="issues-list__container">
  <div class="issues-list__list">
    <ui-card>
      <ng-template uiCardHeader>
        <h2 uiCardTitle>
          <i class="fa-solid fa-list-check"></i> List of issues
        </h2>
      </ng-template>
      <ul class="max-w-md divide-y divide-gray-200">
        @for (issue of [1, 2, 3, 4, 5, 6, 7, 8, 9]; track issue) {
          <li class="py-2 px-2 hover:bg-gray-200">
            <a [routerLink]="[]" [queryParams]="{issue: 'LBB-'+issue}"
               class="flex items-center space-x-4 rtl:space-x-reverse">
              <div class="flex-shrink-0">
                <div
                  class="flex justify-center align-middle flex-col items-center text-white rounded-full bg-blue-600 w-10 h-10">
                  LBB
                </div>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-gray-900 truncate">
                  [LBB-{{ issue }}] Example Issue
                </p>
                <p class="text-sm text-gray-500 truncate">
                  assigned to : <i>xyz</i>
                </p>
              </div>
              <div class="inline-flex items-center text-base font-semibold text-gray-900">
                <i class="fa-solid fa-right-to-bracket text-gray-500"></i>
              </div>
            </a>
          </li>
        } @empty {
          <li class="py-2 px-2">
            <span class="text-gray-400">There is no issues using selected filter</span>
          </li>
        }
      </ul>
    </ui-card>
  </div>
  <div class="issues-list__preview">
    <ui-loader [onLoading]="vm().onLoadingIssue">
      <lbb-pm-issue [issue]="vm().selectedIssue" />
    </ui-loader>
  </div>
</div>
