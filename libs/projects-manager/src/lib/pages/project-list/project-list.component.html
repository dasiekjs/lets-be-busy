
<h2 class="projects-list__header">Projects list</h2>

<div class="projects-list__grid">
  @for(p of ['LBB']; track p) {
    <ui-card>
      <div class="project-card__info">
        <div class="flex justify-center align-middle flex-col items-center text-white rounded-full bg-blue-600 w-16 h-16">LBB</div>
        <h3>Let's be busy</h3>
        <small class="text-gray-400">Simple project manager</small>
      </div>
      <div class="project-card__actions">
        <a uiButton [routerLink]="['../',p ,'settings']">
          <i class="fa-solid fa-gears"></i> Settings
        </a>
        <a uiButton [routerLink]="['../',p ,'issues']">
          <i class="fa-solid fa-list"></i> Issues
        </a>
      </div>
    </ui-card>
  }
</div>
